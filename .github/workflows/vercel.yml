name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Normalize Vercel token
        env:
          RAW_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          VERCEL_TOKEN="$(printf '%s' "${RAW_VERCEL_TOKEN}" | tr -d '[:space:]')"
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "VERCEL_TOKEN is not configured."
            exit 1
          fi
          echo "::add-mask::${VERCEL_TOKEN}"
          echo "VERCEL_TOKEN=${VERCEL_TOKEN}" >> "${GITHUB_ENV}"

      - name: Deploy
        run: npx vercel deploy --prod --yes --token="${VERCEL_TOKEN}"
